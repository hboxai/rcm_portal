name: Deploy RCM Portal

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:    

jobs:
  deploy:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ vars.DEPLOY_BRANCH }}

      - name: Set deployment path
        id: set-path
        run: |
          TAG=$(echo "$GITHUB_REF" | sed 's/refs\/tags\///')
          echo "TAG=$TAG" >> $GITHUB_ENV
          if [[ "$TAG" == *-stage ]]; then
            echo "DEPLOY_DIR=/rcm-portal-stage" >> $GITHUB_ENV
          else
            echo "DEPLOY_DIR=/rcm-portal" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Prepare remote directories
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Remove old upload directory
            rm -rf ~/rcm-portal-upload
            
            # Create fresh upload directory with proper permissions
            mkdir -p ~/rcm-portal-upload
            chmod 755 ~/rcm-portal-upload
            
            # Ensure deployment directories exist
            sudo mkdir -p ~/rcm-portal
            sudo mkdir -p ~/rcm-portal-stage
            sudo chown -R $USER:$USER ~/rcm-portal
            sudo chown -R $USER:$USER ~/rcm-portal-stage

      - name: Upload project to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "~/rcm-portal-upload"
          overwrite: true
          strip_components: 0

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            TAG=${{ env.TAG }}
            if [[ "$TAG" == *-stage ]]; then
              DEPLOY_DIR="$HOME/rcm-portal-stage"
            else
              DEPLOY_DIR="$HOME/rcm-portal"
            fi
            sudo mkdir -p $DEPLOY_DIR
            cd ~
            sudo rsync -avzq --exclude '.env' ~/rcm-portal-upload/ $DEPLOY_DIR/
            
            # Create .env file from GitHub secrets
            sudo tee $DEPLOY_DIR/.env > /dev/null <<EOF
            # Database Configuration
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_SSL_ENABLED=${{ secrets.DB_SSL_ENABLED }}
            
            # JWT Configuration
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN || '24h' }}
            
            # AWS/S3 Configuration
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION || 'us-east-1' }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            
            # Environment
            NODE_ENV=production
            PORT=5000
            EOF
            
            sudo chmod 600 $DEPLOY_DIR/.env
            
            cd $DEPLOY_DIR
            echo "PWD: $(pwd)"
            if [ -f docker-compose.yml ]; then
              # Force stop and remove existing containers
              sudo docker-compose down --remove-orphans || true
              sudo docker rm -f rcm-portal || true
              sudo docker network prune -f || true
              
              # Build and start new containers
              sudo docker-compose build --no-cache
              sudo docker-compose --env-file $DEPLOY_DIR/.env config
              sudo docker-compose --env-file $DEPLOY_DIR/.env up -d
              
              # Wait for container to start
              echo "Waiting for container to start..."
              sleep 10
              
              # Diagnostic output
              echo ""
              echo "=== DEPLOYMENT DIAGNOSTICS ==="
              echo "1. Container status:"
              sudo docker ps | grep rcm-portal
              echo ""
              echo "2. Environment variables in container:"
              sudo docker exec rcm-portal printenv | grep -E "JWT_SECRET|DB_HOST|DB_PASSWORD|DB_NAME" | sed 's/\(.*=\).*/\1***/'
              echo ""
              echo "3. Backend logs (last 20 lines):"
              sudo docker logs rcm-portal 2>&1 | tail -20
              echo ""
              echo "4. Test database connection:"
              sudo docker exec rcm-portal node -e "const {Pool}=require('pg');const p=new Pool({host:process.env.DB_HOST,port:process.env.DB_PORT,database:process.env.DB_NAME,user:process.env.DB_USER,password:process.env.DB_PASSWORD,ssl:process.env.DB_SSL_ENABLED==='true'?{rejectUnauthorized:false}:false});p.query('SELECT COUNT(*) FROM rcm_portal_auth_users').then(r=>{console.log('DB OK - Users:',r.rows[0].count);p.end()}).catch(e=>{console.error('DB Error:',e.message);p.end()});" 2>&1
              echo ""
              echo "=== END DIAGNOSTICS ==="
            else
              echo "Error: docker-compose.yml not found in $DEPLOY_DIR"
              ls -la $DEPLOY_DIR
              exit 1
            fi
 
