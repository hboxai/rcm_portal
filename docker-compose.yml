services:
  rcm-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rcm-portal
    restart: unless-stopped
    ports:
      - "8082:8082"  # Nginx serves everything on 8082
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env # For start.sh to copy to frontend, and general app availability
      - ./.env:/app/backend/.env # Mount the root .env directly for the backend
    networks:
      - rcm-network
    extra_hosts:
      - "localhost.aptible.in:host-gateway" # Allows container to reach host for tunnel
      - "host.docker.internal:host-gateway" # Alternative way to reach host

networks:
  rcm-network:
    driver: bridge
